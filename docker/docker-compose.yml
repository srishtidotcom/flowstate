version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: flowstate
      POSTGRES_USER: flowstate_user
      POSTGRES_PASSWORD: flowstate123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  chroma_data:
